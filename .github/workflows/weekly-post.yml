name: Weekly Auto Post

on:
  schedule:
    - cron: '0 1 * * 1'  # 毎週月曜 1:00 UTC（日本時間10:00）
  workflow_dispatch:        # 手動実行も可

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install script dependencies
        run: npm install --no-save rss-parser @google/generative-ai

      - name: Generate weekly post
        run: node scripts/generate-post.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ scripts/processed-articles.json
          git diff --cached --quiet || git commit -m "auto: weekly post $(date +%Y-%m-%d)"
          git push
